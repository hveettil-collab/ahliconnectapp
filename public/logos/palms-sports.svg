<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="white"/>
  <!-- Palms Sports logo: abstract figure with swoosh forming a globe -->
  <g transform="translate(100,95)">
    <!-- Outer arc (right swoosh) -->
    <path d="M-5 -42 C25 -42 42 -25 42 0 C42 25 25 42 0 42" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
    <!-- Outer arc (left swoosh) -->
    <path d="M5 -42 C-25 -42 -42 -25 -42 0 C-42 25 -25 42 0 42" fill="none" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
    <!-- Inner figure - person with arms up -->
    <circle cx="0" cy="-30" r="8" fill="#5B21B6"/>
    <!-- Body -->
    <path d="M0 -22 L0 10" stroke="#5B21B6" stroke-width="5" stroke-linecap="round"/>
    <!-- Arms raised -->
    <path d="M0 -12 C-8 -20 -18 -28 -25 -32" stroke="#5B21B6" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M0 -12 C8 -20 18 -28 25 -32" stroke="#5B21B6" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Legs -->
    <path d="M0 10 L-12 30" stroke="#5B21B6" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 10 L12 30" stroke="#5B21B6" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
