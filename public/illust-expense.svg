<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FFFBEB"/>
    </linearGradient>
  </defs>
  <rect width="240" height="160" rx="16" fill="url(#bg3)"/>
  <!-- Phone outline -->
  <rect x="75" y="20" width="90" height="120" rx="14" fill="white" stroke="#DFE1E6" stroke-width="1.5"/>
  <!-- Phone screen -->
  <rect x="81" y="34" width="78" height="92" rx="4" fill="#F8F9FB"/>
  <!-- Camera notch -->
  <rect x="107" y="24" width="26" height="6" rx="3" fill="#DFE1E6"/>
  <!-- Receipt being scanned -->
  <rect x="92" y="42" width="56" height="70" rx="6" fill="white" stroke="#FFBD4C" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Receipt lines -->
  <rect x="100" y="52" width="40" height="3" rx="1.5" fill="#DFE1E6"/>
  <rect x="100" y="60" width="32" height="3" rx="1.5" fill="#DFE1E6"/>
  <rect x="100" y="68" width="36" height="3" rx="1.5" fill="#DFE1E6"/>
  <!-- Divider -->
  <line x1="100" y1="76" x2="140" y2="76" stroke="#DFE1E6" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Total amount -->
  <rect x="100" y="82" width="20" height="3" rx="1.5" fill="#A4ABB8"/>
  <rect x="124" y="80" width="16" height="6" rx="2" fill="#FFBD4C" opacity="0.3"/>
  <text x="126" y="85" font-size="5" font-weight="bold" fill="#EA580C" font-family="system-ui">AED</text>
  <!-- Scan line animation indicator -->
  <line x1="88" y1="65" x2="152" y2="65" stroke="#FFBD4C" stroke-width="1.5" opacity="0.5"/>
  <!-- Category tags floating out -->
  <rect x="168" y="45" width="44" height="16" rx="8" fill="#40C4AA" opacity="0.15"/>
  <text x="175" y="55" font-size="6" fill="#059669" font-family="system-ui" font-weight="600">Food</text>
  <rect x="170" y="68" width="50" height="16" rx="8" fill="#9D63F6" opacity="0.15"/>
  <text x="177" y="78" font-size="6" fill="#7C3AED" font-family="system-ui" font-weight="600">Travel</text>
  <rect x="166" y="91" width="56" height="16" rx="8" fill="#FFBD4C" opacity="0.15"/>
  <text x="172" y="101" font-size="6" fill="#EA580C" font-family="system-ui" font-weight="600">Supplies</text>
  <!-- Arrow lines from receipt to categories -->
  <path d="M148 55 L168 52" stroke="#DFE1E6" stroke-width="1" stroke-linecap="round"/>
  <path d="M148 65 L170 75" stroke="#DFE1E6" stroke-width="1" stroke-linecap="round"/>
  <path d="M148 75 L166 98" stroke="#DFE1E6" stroke-width="1" stroke-linecap="round"/>
  <!-- AI brain icon -->
  <circle cx="38" cy="70" r="18" fill="#FFBD4C" opacity="0.12"/>
  <circle cx="38" cy="70" r="10" stroke="#FFBD4C" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M34 70c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="#FFBD4C" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="36" cy="68" r="1" fill="#FFBD4C" opacity="0.6"/>
  <circle cx="40" cy="68" r="1" fill="#FFBD4C" opacity="0.6"/>
  <!-- Sparkles -->
  <circle cx="55" cy="40" r="2" fill="#9D63F6" opacity="0.3"/>
  <circle cx="200" cy="130" r="3" fill="#FFBD4C" opacity="0.3"/>
</svg>